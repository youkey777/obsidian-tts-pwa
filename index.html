<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#7c3aed">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <link rel="manifest" href="manifest.json">
  <title>ObsTTS</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f1a;
      --card: #1a1a2e;
      --elevated: #252540;
      --accent: #7c3aed;
      --accent-light: #a78bfa;
      --highlight-bg: rgba(74, 222, 128, 0.12);
      --highlight-border: #4ade80;
      --text: #e2e8f0;
      --muted: #94a3b8;
      --danger: #ef4444;
      --radius: 12px;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --safe-top: env(safe-area-inset-top, 0px);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, 'Hiragino Sans', 'Noto Sans JP', 'Meiryo', sans-serif;
      font-size: 15px;
      line-height: 1.65;
      overflow: hidden;
    }

    #app {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      padding-top: var(--safe-top);
    }

    /* ── Header ── */
    #header {
      background: var(--card);
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
      border-bottom: 1px solid var(--elevated);
    }
    #app-title {
      font-size: 17px;
      font-weight: 700;
      color: var(--accent-light);
      white-space: nowrap;
      letter-spacing: -0.3px;
    }
    #note-title {
      flex: 1;
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ── Tabs ── */
    #tabs {
      display: flex;
      background: var(--card);
      flex-shrink: 0;
      border-bottom: 1px solid var(--elevated);
    }
    .tab {
      flex: 1;
      padding: 11px 8px;
      text-align: center;
      font-size: 13px;
      color: var(--muted);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: color 0.2s, border-color 0.2s;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    .tab.active {
      color: var(--accent-light);
      border-bottom-color: var(--accent);
    }

    /* ── Preview Panel ── */
    #preview-panel {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 14px 16px;
      display: none;
    }
    #preview-panel.active { display: block; }

    #empty-state {
      text-align: center;
      color: var(--muted);
      padding: 32px 20px;
      line-height: 2.2;
      font-size: 14px;
    }
    #empty-state .icon { font-size: 48px; display: block; margin-bottom: 12px; }

    #btn-clipboard-main {
      display: block;
      width: 100%;
      margin: 20px 0 8px;
      padding: 16px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: var(--radius);
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      letter-spacing: 0.3px;
    }
    #btn-clipboard-main:active { opacity: 0.82; }

    .empty-hint {
      font-size: 12px;
      color: var(--muted);
      margin-top: 6px;
    }

    /* クリップボード検出バナー */
    #clipboard-banner {
      display: none;
      background: var(--elevated);
      border: 1px solid var(--accent);
      border-radius: var(--radius);
      padding: 12px 14px;
      margin-bottom: 12px;
      font-size: 13px;
    }
    #clipboard-banner.show { display: flex; align-items: center; gap: 10px; }
    #clipboard-banner-text { flex: 1; color: var(--text); }
    #clipboard-banner-text small { display: block; color: var(--muted); font-size: 11px; margin-top: 2px; }
    #btn-clipboard-load {
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 8px;
      padding: 8px 14px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      -webkit-tap-highlight-color: transparent;
    }
    #btn-clipboard-dismiss {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 18px;
      cursor: pointer;
      padding: 4px;
      line-height: 1;
    }

    .segment {
      padding: 9px 12px;
      margin-bottom: 5px;
      border-radius: 8px;
      border-left: 3px solid transparent;
      cursor: pointer;
      transition: background 0.12s, border-color 0.12s;
      color: var(--text);
      font-size: 14px;
      -webkit-tap-highlight-color: transparent;
    }
    .segment:active { background: var(--elevated); }
    .segment.active {
      background: var(--highlight-bg);
      border-left-color: var(--highlight-border);
    }

    /* ── Input Panel ── */
    #input-panel {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 14px 16px;
      display: none;
      flex-direction: column;
      gap: 12px;
    }
    #input-panel.active { display: flex; }

    #text-input {
      flex: 1;
      min-height: 180px;
      background: var(--elevated);
      border: 1px solid #333;
      border-radius: var(--radius);
      color: var(--text);
      font-family: inherit;
      font-size: 14px;
      line-height: 1.6;
      padding: 12px;
      resize: none;
      outline: none;
      -webkit-appearance: none;
    }
    #text-input:focus { border-color: var(--accent); }
    #text-input::placeholder { color: var(--muted); }

    #btn-load {
      width: 100%;
      padding: 15px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: var(--radius);
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      flex-shrink: 0;
    }
    #btn-load:active { opacity: 0.82; }

    /* ── Controls ── */
    #controls {
      background: var(--card);
      border-top: 1px solid var(--elevated);
      padding: 12px 16px;
      padding-bottom: calc(12px + var(--safe-bottom));
      flex-shrink: 0;
    }

    #progress-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 11px;
    }
    #progress-bar-track {
      flex: 1;
      height: 4px;
      background: var(--elevated);
      border-radius: 2px;
      overflow: hidden;
    }
    #progress-bar-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 2px;
      width: 0%;
      transition: width 0.25s;
    }
    #progress-text {
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap;
      min-width: 56px;
      text-align: right;
    }

    #speed-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }
    #speed-label { font-size: 12px; color: var(--muted); white-space: nowrap; }
    #speed-slider {
      flex: 1;
      -webkit-appearance: none;
      height: 4px;
      background: var(--elevated);
      border-radius: 2px;
      outline: none;
    }
    #speed-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: var(--accent);
      cursor: pointer;
    }
    #speed-display {
      font-size: 13px;
      font-weight: 700;
      color: var(--accent-light);
      min-width: 38px;
      text-align: right;
    }

    #btn-row {
      display: flex;
      gap: 10px;
      align-items: center;
      justify-content: center;
    }

    .btn {
      border: none;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.1s, opacity 0.2s;
      flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
    }
    .btn:active { transform: scale(0.91); }
    .btn:disabled { opacity: 0.35; pointer-events: none; }

    #btn-play {
      width: 74px;
      height: 74px;
      background: var(--accent);
      font-size: 28px;
      color: white;
      box-shadow: 0 4px 16px rgba(124, 58, 237, 0.45);
    }
    #btn-stop {
      width: 54px;
      height: 54px;
      background: var(--elevated);
      font-size: 20px;
      color: var(--danger);
    }
    #btn-prev, #btn-next {
      width: 54px;
      height: 54px;
      background: var(--elevated);
      font-size: 20px;
      color: var(--text);
    }

    /* ── Toast ── */
    #settings-panel {
      display: none;
      flex-direction: column;
      padding: 16px;
      gap: 14px;
      overflow-y: auto;
      flex: 1;
    }
    #settings-panel.active { display: flex; }
    .settings-group { display: flex; flex-direction: column; gap: 6px; }
    .settings-label { font-size: 13px; color: var(--muted); font-weight: 500; }
    .settings-hint { font-size: 11px; color: var(--muted); opacity: 0.75; line-height: 1.5; }
    #cloud-api-key {
      background: var(--elevated);
      color: var(--text);
      border: 1px solid rgba(124,58,237,0.35);
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 13px;
      font-family: monospace;
      width: 100%;
    }
    #cloud-api-key::placeholder { color: var(--muted); opacity: 0.6; }
    #cloud-voice-select {
      background: var(--elevated);
      color: var(--text);
      border: 1px solid rgba(124,58,237,0.35);
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 13px;
      width: 100%;
    }
    #btn-save-settings {
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 10px;
      padding: 13px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 4px;
    }
    #cloud-status { text-align: center; font-size: 12px; color: var(--highlight-border); min-height: 18px; }

    .segment-heading {
      border-top: 2px solid rgba(124,58,237,0.5);
      color: var(--accent-light);
      font-weight: 600;
      padding-top: 10px;
      margin-top: 4px;
      letter-spacing: 0.3px;
    }

    #voice-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 16px 8px;
    }
    #voice-label { font-size: 13px; color: var(--muted); white-space: nowrap; }
    #voice-select {
      flex: 1;
      background: var(--elevated);
      color: var(--text);
      border: 1px solid rgba(124,58,237,0.3);
      border-radius: 8px;
      padding: 6px 8px;
      font-size: 12px;
    }

    #toast {
      position: fixed;
      bottom: calc(160px + var(--safe-bottom));
      left: 50%;
      transform: translateX(-50%) translateY(12px);
      background: rgba(37, 37, 64, 0.95);
      color: var(--text);
      padding: 10px 20px;
      border-radius: 20px;
      font-size: 13px;
      opacity: 0;
      transition: opacity 0.25s, transform 0.25s;
      pointer-events: none;
      white-space: nowrap;
      z-index: 100;
      backdrop-filter: blur(8px);
    }
    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>
<body>
<div id="app">

  <div id="header">
    <span id="app-title">🎧 ObsTTS</span>
    <span id="note-title">共有またはテキストを貼り付けて開始</span>
    <button id="btn-clear" title="クリア" style="display:none; background:transparent; border:1px solid rgba(255,255,255,0.2); color:#94a3b8; border-radius:6px; padding:4px 10px; font-size:12px; cursor:pointer; flex-shrink:0;">クリア</button>
  </div>

  <div id="tabs">
    <div class="tab active" data-tab="preview">読み上げ</div>
    <div class="tab" data-tab="input">テキスト入力</div>
    <div class="tab" data-tab="settings">⚙ 設定</div>
  </div>

  <div id="preview-panel" class="active">
    <div id="clipboard-banner">
      <div id="clipboard-banner-text">
        クリップボードにテキストを検出
        <small id="clipboard-preview"></small>
      </div>
      <button id="btn-clipboard-load">読み込む</button>
      <button id="btn-clipboard-dismiss">✕</button>
    </div>
    <div id="empty-state">
      <span class="icon">🎧</span>
      <div>Obsidianでノートを<br>「すべて選択 → コピー」してから</div>
      <button id="btn-clipboard-main">📋 クリップボードから読み込む</button>
      <div class="empty-hint">または「テキスト入力」タブから貼り付け</div>
    </div>
    <div id="segments-container"></div>
  </div>

  <div id="input-panel">
    <textarea id="text-input" placeholder="ここにMarkdownテキストを貼り付けてください...&#10;&#10;Obsidianのノート、Discordのメッセージなど何でもOKです。URLやMarkdown記号は自動で除去します。"></textarea>
    <button id="btn-load">読み上げ開始</button>
  </div>

  <div id="settings-panel">
    <div class="settings-group">
      <div class="settings-label">Gemini APIキー（Google AI Studio）</div>
      <input type="password" id="cloud-api-key" placeholder="AIzaSy... （未入力 = デバイス音声）" autocomplete="off">
      <div class="settings-hint">Google AI Studio（ai.google.dev）で無料取得。Gemini 3.1 Flash TTS を使用。無料枠あり（レート制限内）。</div>
    </div>
    <div class="settings-group">
      <div class="settings-label">音声の種類</div>
      <select id="cloud-voice-select">
        <option value="Kore">Kore（女性・落ち着き・推奨）</option>
        <option value="Aoede">Aoede（女性・明るい）</option>
        <option value="Leda">Leda（女性・やわらか）</option>
        <option value="Zephyr">Zephyr（中性・さわやか）</option>
        <option value="Puck">Puck（男性・活発）</option>
        <option value="Charon">Charon（男性・深み）</option>
        <option value="Fenrir">Fenrir（男性・力強い）</option>
        <option value="Orus">Orus（男性・低音）</option>
      </select>
    </div>
    <button id="btn-save-settings">保存して適用</button>
    <button id="btn-test-key" style="background:#1e3a5f; margin-top:6px;">APIキーをテスト</button>
    <button id="btn-reload-app" style="background:#374151; margin-top:6px;">🔄 アプリを再読み込み（キャッシュ更新）</button>
    <div id="cloud-status"></div>
    <div id="char-usage-display" style="margin-top:12px; padding:10px; background:#1a1a2e; border-radius:8px; font-size:13px; color:#94a3b8;"></div>
  </div>

  <div id="controls">
    <div id="progress-row">
      <div id="progress-bar-track">
        <div id="progress-bar-fill"></div>
      </div>
      <div id="progress-text">0 / 0</div>
    </div>
    <div id="speed-row">
      <span id="speed-label">速度</span>
      <input type="range" id="speed-slider" min="10" max="20" step="1" value="17">
      <span id="speed-display">1.7x</span>
    </div>
    <div id="voice-row">
      <span id="voice-label">音声</span>
      <select id="voice-select"><option>読み込み中…</option></select>
    </div>
    <div id="btn-row">
      <button class="btn" id="btn-prev">⏮</button>
      <button class="btn" id="btn-play">▶</button>
      <button class="btn" id="btn-stop">⏹</button>
      <button class="btn" id="btn-next">⏭</button>
    </div>
  </div>

</div>
<div id="toast"></div>

<script>
// ============================================================
// MARKDOWN PREPROCESSOR
// Handles: 政治学習ノート / ニュースノート / リサーチノート
// ============================================================
function preprocessMarkdown(raw) {
  let t = raw;

  // ニュースノートのソースセクション全体を削除（### ソース 以降を次の見出しまで除去）
  {
    const lines = t.split('\n');
    let inSource = false;
    t = lines.filter(line => {
      if (/^#{1,6}\s+ソース\s*$/.test(line)) { inSource = true; return false; }
      if (inSource && /^#{1,6}\s/.test(line)) inSource = false;
      return !inSource;
    }).join('\n');
  }

  // ニュースノートのメタデータ行を削除（媒体・掲載・元タイトル・元記事・ソース・記事 ＋ コロン）
  t = t.replace(/^[^\n]*(?:\*\*)?(?:媒体|元タイトル|掲載|元記事|ソース|記事)(?:\*\*)?[：:][^\n]*$/gm, '');

  // YAMLフロントマター
  t = t.replace(/^---[\s\S]*?---\s*\n/, '');

  // HTMLブロック（<details> quiz等）
  t = t.replace(/<details[\s\S]*?<\/details>/gi, '');
  t = t.replace(/<!--[\s\S]*?-->/g, '');
  t = t.replace(/<[^>]+>/g, '');

  // コードブロック
  t = t.replace(/```[\s\S]*?```/g, '');
  t = t.replace(/`[^`\n]+`/g, '');

  // URL（ベアURL）
  t = t.replace(/https?:\/\/[^\s\)\]>「」。、）\n]+/g, '');

  // Markdownリンク [text](url) → text
  t = t.replace(/\[([^\]]+)\]\([^)]*\)/g, '$1');

  // Wikiリンク [[display|link]] or [[link]]
  t = t.replace(/\[\[([^\]|]+)\|([^\]]+)\]\]/g, '$2');
  t = t.replace(/\[\[([^\]]+)\]\]/g, (_, l) => l.replace(/\/$/, ''));

  // 引用番号 [1][2]
  t = t.replace(/\[\d+\]/g, '');

  // ハッシュタグ行（ニュースノートで多用）
  t = t.replace(/^#[^\s#][^\n]*$/gm, '');
  t = t.replace(/ #[\w぀-鿿゠-ヿ一-鿿]+/g, '');

  // ヘッダー記号除去（テキストは残す）
  t = t.replace(/^#{1,6}\s+(.+)$/gm, (_, h) => '\n\n\x02' + h + '\n\n');

  // 太字・斜体
  t = t.replace(/\*\*\*([^*\n]+)\*\*\*/g, '$1');
  t = t.replace(/\*\*([^*\n]+)\*\*/g, '$1');
  t = t.replace(/\*([^*\n]+)\*/g, '$1');
  t = t.replace(/__([^_\n]+)__/g, '$1');
  t = t.replace(/_([^_\n]+)_/g, '$1');

  // 引用ブロック
  t = t.replace(/^>\s*/gm, '');

  // テーブル → セル内容を読点でつなぐ
  t = t.replace(/^\|(.+)\|$/gm, (_, cells) =>
    cells.split('|')
      .map(c => c.trim())
      .filter(c => c && !/^[-:\s]+$/.test(c))
      .join('、')
  );

  // 区切り線
  t = t.replace(/^[-*_]{3,}\s*$/gm, '');

  // リスト記号除去（テキストは残す）
  t = t.replace(/^[\-\*\+]\s+/gm, '');
  t = t.replace(/^\d+\.\s+/gm, '');

  // 絵文字除去（読み上げ時に「はてなマーク」「ぺーぱーくりっぷ」等と読まれるのを防ぐ）
  t = t.replace(/[\u{1F300}-\u{1FFFF}]/gu, '');  // 絵文字メインブロック
  t = t.replace(/[\u{2600}-\u{27BF}]/gu, '');     // 記号・デコ系
  t = t.replace(/\uFE0F/g, '');                    // variation selector-16
  t = t.replace(/\u200D/g, '');                    // zero-width joiner
  t = t.replace(/[\u{1F000}-\u{1F0FF}]/gu, '');   // 麻雀・トランプ牌

  // 余白整理
  t = t.replace(/\n{3,}/g, '\n\n');
  return t.trim();
}

// ============================================================
// PCM → WAV 変換
// ============================================================
function pcmToWav(b64, sampleRate = 24000) {
  const pcm = Uint8Array.from(atob(b64), c => c.charCodeAt(0));
  const numCh = 1, bps = 16;
  const buf = new ArrayBuffer(44 + pcm.length);
  const v = new DataView(buf);
  const w = (o, s) => [...s].forEach((c, i) => v.setUint8(o + i, c.charCodeAt(0)));
  w(0, 'RIFF'); v.setUint32(4, 36 + pcm.length, true);
  w(8, 'WAVE'); w(12, 'fmt '); v.setUint32(16, 16, true);
  v.setUint16(20, 1, true); v.setUint16(22, numCh, true);
  v.setUint32(24, sampleRate, true); v.setUint32(28, sampleRate * numCh * bps / 8, true);
  v.setUint16(32, numCh * bps / 8, true); v.setUint16(34, bps, true);
  w(36, 'data'); v.setUint32(40, pcm.length, true);
  new Uint8Array(buf, 44).set(pcm);
  return URL.createObjectURL(new Blob([buf], { type: 'audio/wav' }));
}

// ============================================================
// TTS ENGINE
// ============================================================
class TTSEngine {
  constructor() {
    this.segments = [];
    this.segmentTypes = [];
    this.currentIndex = 0;
    this.isPlaying = false;
    this.rate = 1.7;
    this._lastCharIndex = 0;
    this.onSegmentChange = null;
    this.onEnd = null;
    this._voices = [];
    this._cloudKey = '';
    this._cloudVoice = 'Kore';
    this._audioCache = new Map();
    this._currentAudio = null;
    this._sharedAudioCtx = null;
    this._initVoices();
  }

  // ユーザーアクション内で呼び出し、AudioContextをrunning状態にする（モバイル対応）
  _ensureAudioCtx() {
    if (!this._sharedAudioCtx || this._sharedAudioCtx.state === 'closed') {
      this._sharedAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if (this._sharedAudioCtx.state === 'suspended') {
      this._sharedAudioCtx.resume().catch(() => {});
    }
  }

  setCloudKey(key, voice) {
    this._cloudKey = key || '';
    if (voice) this._cloudVoice = voice;
    if (!key) this._audioCache.clear();
  }

  async _fetchCloudAudio(text) {
    if (this._audioCache.has(text)) return this._audioCache.get(text);
    const res = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/gemini-3.1-flash-tts-preview:generateContent?key=${this._cloudKey}`,
      {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          contents: [{ parts: [{ text }] }],
          generationConfig: {
            responseModalities: ['AUDIO'],
            speechConfig: {
              voiceConfig: {
                prebuiltVoiceConfig: { voiceName: this._cloudVoice }
              }
            }
          }
        })
      }
    );
    const data = await res.json();
    if (data.error) throw new Error(data.error.message);
    const part = data.candidates?.[0]?.content?.parts?.[0];
    if (!part?.inlineData?.data) throw new Error('音声データが返ってきませんでした');
    const result = { data: part.inlineData.data, mimeType: part.inlineData.mimeType || 'audio/pcm;rate=24000' };
    this._audioCache.set(text, result);
    addCloudChars(text.length);
    return result;
  }

  async _speakCloud(idx) {
    if (idx >= this.segments.length) {
      this.isPlaying = false;
      this.currentIndex = 0;
      if (this.onSegmentChange) this.onSegmentChange(-1);
      if (this.onEnd) this.onEnd();
      return;
    }
    this.currentIndex = idx;
    if (this.onSegmentChange) this.onSegmentChange(idx);
    if (idx + 1 < this.segments.length) {
      this._fetchCloudAudio(this.segments[idx + 1]).catch(() => {});
    }
    try {
      const { data: b64, mimeType } = await this._fetchCloudAudio(this.segments[idx]);
      if (!this.isPlaying) return;
      // audio/pcm と audio/L16 の両方をPCMとして扱う
      const isPcm = mimeType && (mimeType.includes('pcm') || mimeType.toLowerCase().includes('l16'));
      const sampleRate = parseInt(mimeType?.match(/rate=(\d+)/)?.[1] || '24000');
      if (isPcm) {
        // 事前にplay()で作成済みのコンテキストを使用（ユーザーアクションのコンテキストを保持）
        if (!this._sharedAudioCtx || this._sharedAudioCtx.state === 'closed') {
          this._sharedAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        if (this._sharedAudioCtx.state === 'suspended') {
          await this._sharedAudioCtx.resume();
        }
        const ctx = this._sharedAudioCtx;
        const pcm = Uint8Array.from(atob(b64), c => c.charCodeAt(0));
        const samples = pcm.length / 2;
        const audioBuf = ctx.createBuffer(1, samples, sampleRate);
        const ch = audioBuf.getChannelData(0);
        const dv = new DataView(pcm.buffer);
        for (let i = 0; i < samples; i++) ch[i] = dv.getInt16(i * 2, true) / 32768;
        const source = ctx.createBufferSource();
        source.buffer = audioBuf;
        source.playbackRate.value = this.rate;
        source.connect(ctx.destination);
        await new Promise((resolve, reject) => {
          source.onended = resolve;
          try { source.start(); } catch(e) { reject(e); }
        });
      } else {
        this._currentAudio = new Audio(`data:${mimeType};base64,${b64}`);
        this._currentAudio.playbackRate = this.rate;
        await new Promise((resolve, reject) => {
          this._currentAudio.onended = resolve;
          this._currentAudio.onerror = () => reject(new Error('再生エラー'));
          this._currentAudio.play().catch(reject);
        });
      }
      if (this.isPlaying) this._speakCloud(idx + 1);
    } catch (e) {
      this.isPlaying = false;
      if (this.onSegmentChange) this.onSegmentChange(-1);
      const msg = e.message || String(e);
      const cached = this._audioCache.get(this.segments[idx]);
      const mt = cached?.mimeType || '不明';
      const ctxState = this._sharedAudioCtx?.state || 'なし';
      alert('Cloud TTS エラー\n種別: ' + (e.name || '不明') + '\n内容: ' + msg + '\nmimeType: ' + mt + '\nAudioCtx: ' + ctxState);
    }
  }

  _initVoices() {
    const load = () => {
      this._voices = window.speechSynthesis.getVoices();
      this._updateVoiceSelect();
    };
    load();
    window.speechSynthesis.addEventListener('voiceschanged', load);
  }

  _updateVoiceSelect() {
    const sel = document.getElementById('voice-select');
    if (!sel) return;
    const jaVoices = this._voices.filter(v => v.lang.startsWith('ja'));
    if (!jaVoices.length) return;
    sel.innerHTML = jaVoices.map((v, i) =>
      `<option value="${i}">${v.name}${v.localService ? '' : ' (ネット)'}</option>`
    ).join('');
    const preferred = jaVoices.findIndex(v => v.name.includes('Google'));
    if (preferred >= 0) sel.value = String(preferred);
  }

  _jaVoice() {
    const sel = document.getElementById('voice-select');
    const idx = sel ? parseInt(sel.value, 10) : NaN;
    const jaVoices = this._voices.filter(v => v.lang.startsWith('ja'));
    if (!isNaN(idx) && jaVoices[idx]) return jaVoices[idx];
    return this._voices.find(v => v.lang === 'ja-JP' && v.localService)
        || this._voices.find(v => v.lang === 'ja-JP')
        || null;
  }

  _buildSegments(text) {
    this.segments = [];
    this.segmentTypes = [];
    for (const para of text.split(/\n{2,}/)) {
      const p = para.trim();
      if (!p) continue;
      const isHeading = p.charCodeAt(0) === 0x02;
      const clean = isHeading ? p.slice(1) : p;
      if (clean.length <= 250) {
        this.segments.push(clean);
        this.segmentTypes.push(isHeading ? 'heading' : 'normal');
      } else {
        for (const s of clean.split(/(?<=[。！？])\s*/)) {
          if (s.trim()) {
            this.segments.push(s.trim());
            this.segmentTypes.push('normal');
          }
        }
      }
    }
  }

  load(cleanText) {
    this.stop();
    this._buildSegments(cleanText);
    this.currentIndex = 0;
  }

  play() {
    if (this.isPlaying || !this.segments.length) return;
    if (this.currentIndex >= this.segments.length) this.currentIndex = 0;
    this.isPlaying = true;
    // ユーザーアクション（タップ）の直後にAudioContextを起動状態にする（モバイルAutoplay Policy対応）
    if (this._cloudKey) this._ensureAudioCtx();
    if (this._cloudKey && this._currentAudio?.paused) {
      this._currentAudio.play();
      this._currentAudio.onended = () => { if (this.isPlaying) this._speakCloud(this.currentIndex + 1); };
      return;
    }
    this._speak(this.currentIndex);
  }

  _speak(idx, charOffset = 0) {
    if (this._cloudKey) { this._speakCloud(idx); return; }
    if (idx >= this.segments.length) {
      this.isPlaying = false;
      this.currentIndex = 0;
      if (this.onSegmentChange) this.onSegmentChange(-1);
      if (this.onEnd) this.onEnd();
      return;
    }

    this.currentIndex = idx;
    this._lastCharIndex = charOffset;
    if (this.onSegmentChange) this.onSegmentChange(idx);

    const text = charOffset > 0 ? this.segments[idx].slice(charOffset) : this.segments[idx];
    const utt = new SpeechSynthesisUtterance(text);
    utt.lang = 'ja-JP';
    utt.rate = this.rate;
    utt.pitch = 1.0;
    utt.volume = 1.0;
    const v = this._jaVoice();
    if (v) utt.voice = v;

    utt.onboundary = e => { this._lastCharIndex = charOffset + (e.charIndex || 0); };
    utt.onend = () => { if (this.isPlaying) this._speak(idx + 1); };
    utt.onerror = e => {
      if (e.error !== 'interrupted' && e.error !== 'canceled') {
        if (this.isPlaying) this._speak(idx + 1);
      }
    };

    window.speechSynthesis.speak(utt);
  }

  pause() {
    if (!this.isPlaying) return;
    this.isPlaying = false;
    if (this._cloudKey) {
      if (this._currentAudio) this._currentAudio.pause();
      // WebAudio再生中はsuspend（次回resume()で再開できるよう閉じない）
      if (this._sharedAudioCtx?.state === 'running') {
        this._sharedAudioCtx.suspend().catch(() => {});
      }
    } else {
      window.speechSynthesis.cancel();
    }
  }

  _cancelAll() {
    window.speechSynthesis.cancel();
    if (this._currentAudio) { this._currentAudio.pause(); this._currentAudio = null; }
    // _sharedAudioCtxは閉じない（次のplay()で再利用するため）
  }

  stop() {
    this.isPlaying = false;
    this.currentIndex = 0;
    this._lastCharIndex = 0;
    this._cancelAll();
    if (this.onSegmentChange) this.onSegmentChange(-1);
  }

  prev() {
    const idx = Math.max(0, this.currentIndex - 1);
    const wasPlaying = this.isPlaying;
    this.isPlaying = false;
    this._cancelAll();
    this.currentIndex = idx;
    if (this.onSegmentChange) this.onSegmentChange(idx);
    if (wasPlaying) { this.isPlaying = true; if (this._cloudKey) this._ensureAudioCtx(); this._speak(idx); }
  }

  next() {
    const idx = Math.min(this.segments.length - 1, this.currentIndex + 1);
    const wasPlaying = this.isPlaying;
    this.isPlaying = false;
    this._cancelAll();
    this.currentIndex = idx;
    if (this.onSegmentChange) this.onSegmentChange(idx);
    if (wasPlaying) { this.isPlaying = true; if (this._cloudKey) this._ensureAudioCtx(); this._speak(idx); }
  }

  seekTo(idx) {
    const wasPlaying = this.isPlaying;
    this.isPlaying = false;
    this._cancelAll();
    this.currentIndex = Math.max(0, Math.min(idx, this.segments.length - 1));
    if (this.onSegmentChange) this.onSegmentChange(this.currentIndex);
    if (wasPlaying) { this.isPlaying = true; this._speak(this.currentIndex); }
  }

  setRate(r) {
    this.rate = Math.max(1.0, Math.min(2.0, r));
    if (this._cloudKey) {
      if (this._currentAudio) this._currentAudio.playbackRate = this.rate;
    } else if (this.isPlaying) {
      const idx = this.currentIndex;
      const offset = this._lastCharIndex;
      window.speechSynthesis.cancel();
      this._speak(idx, offset);
    }
  }

  get total() { return this.segments.length; }
}

// ============================================================
// INDEXEDDB (Share Target handoff)
// ============================================================
function openShareDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open('obs-tts-share', 1);
    req.onupgradeneeded = e => e.target.result.createObjectStore('pending');
    req.onsuccess = e => resolve(e.target.result);
    req.onerror = reject;
  });
}

async function readAndClearShare() {
  try {
    const db = await openShareDB();
    return new Promise(resolve => {
      const tx = db.transaction('pending', 'readwrite');
      const store = tx.objectStore('pending');
      const req = store.get('latest');
      req.onsuccess = () => {
        const data = req.result;
        if (data) store.delete('latest');
        tx.oncomplete = () => { db.close(); resolve(data || null); };
      };
      req.onerror = () => { db.close(); resolve(null); };
    });
  } catch { return null; }
}

// ============================================================
// WAKE LOCK
// ============================================================
let wakeLock = null;
async function requestWakeLock() {
  if ('wakeLock' in navigator) {
    try {
      wakeLock = await navigator.wakeLock.request('screen');
      wakeLock.addEventListener('release', () => { wakeLock = null; });
    } catch { /* battery saver etc */ }
  }
}
function releaseWakeLock() {
  if (wakeLock) { wakeLock.release(); wakeLock = null; }
}

// ============================================================
// UI
// ============================================================
const tts = new TTSEngine();
const $ = id => document.getElementById(id);

function showToast(msg, ms = 2200) {
  const el = $('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), ms);
}

function escHtml(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function renderSegments(segs) {
  const container = $('segments-container');
  const empty = $('empty-state');
  if (!segs.length) { empty.style.display = 'block'; container.innerHTML = ''; return; }
  empty.style.display = 'none';
  container.innerHTML = segs.map((t, i) => {
    const cls = tts.segmentTypes[i] === 'heading' ? 'segment segment-heading' : 'segment';
    return `<div class="${cls}" data-index="${i}">${escHtml(t)}</div>`;
  }).join('');
}

function updateHighlight(idx) {
  document.querySelectorAll('.segment').forEach(s => s.classList.remove('active'));
  if (idx >= 0) {
    const el = document.querySelector(`.segment[data-index="${idx}"]`);
    if (el) {
      el.classList.add('active');
      el.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
  }
  const total = tts.total;
  const cur = idx >= 0 ? idx + 1 : 0;
  $('progress-text').textContent = `${cur} / ${total}`;
  $('progress-bar-fill').style.width = total > 0 ? `${(cur / total * 100).toFixed(1)}%` : '0%';
}

function updatePlayBtn() {
  $('btn-play').textContent = tts.isPlaying ? '⏸' : '▶';
}

function loadText(raw, title = '') {
  const clean = preprocessMarkdown(raw);
  tts.load(clean);
  renderSegments(tts.segments);
  updateHighlight(-1);
  updatePlayBtn();
  if (title) $('note-title').textContent = title.replace(/\.md$/, '');
  $('btn-clear').style.display = 'block';
  switchTab('preview');
  showToast(`${tts.total}段落を読み込みました`);
}

function clearText() {
  tts.stop();
  tts.segments = [];
  tts.segmentTypes = [];
  renderSegments([]);
  updateHighlight(-1);
  updatePlayBtn();
  $('note-title').textContent = '共有またはテキストを貼り付けて開始';
  $('btn-clear').style.display = 'none';
}

function switchTab(name) {
  document.querySelectorAll('.tab').forEach(t =>
    t.classList.toggle('active', t.dataset.tab === name)
  );
  $('preview-panel').classList.toggle('active', name === 'preview');
  $('input-panel').classList.toggle('active', name === 'input');
  $('settings-panel').classList.toggle('active', name === 'settings');
}

// TTS callbacks
tts.onSegmentChange = idx => { updateHighlight(idx); updatePlayBtn(); };
tts.onEnd = () => { updatePlayBtn(); releaseWakeLock(); showToast('読み上げ完了 ✓'); };

// Buttons
$('btn-play').addEventListener('click', () => {
  if (!tts.total) { showToast('テキストを読み込んでください'); return; }
  if (tts.isPlaying) { tts.pause(); releaseWakeLock(); }
  else { tts.play(); requestWakeLock(); }
  updatePlayBtn();
});
$('btn-clear').addEventListener('click', clearText);
$('btn-stop').addEventListener('click', () => {
  tts.stop(); releaseWakeLock(); updatePlayBtn(); updateHighlight(-1);
});
$('btn-prev').addEventListener('click', () => { if (tts.total) tts.prev(); });
$('btn-next').addEventListener('click', () => { if (tts.total) tts.next(); });

$('speed-slider').addEventListener('input', e => {
  const r = e.target.value / 10;
  $('speed-display').textContent = r.toFixed(1) + 'x';
  tts.setRate(r);
});

$('btn-load').addEventListener('click', () => {
  const text = $('text-input').value.trim();
  if (!text) { showToast('テキストを入力してください'); return; }
  loadText(text);
  $('text-input').value = '';
});

// ============================================================
// CLIPBOARD
// ============================================================
let _pendingClipboardText = '';

async function readClipboard() {
  if (!navigator.clipboard?.readText) {
    showToast('このブラウザではクリップボード読み込みに非対応です');
    return null;
  }
  try {
    const text = await navigator.clipboard.readText();
    return text?.trim() || null;
  } catch (e) {
    showToast('クリップボードへのアクセスが拒否されました');
    return null;
  }
}

async function handleClipboardLoad() {
  const text = _pendingClipboardText || await readClipboard();
  if (!text) { showToast('クリップボードが空です'); return; }
  _pendingClipboardText = '';
  hideBanner();
  loadText(text);
}

function showBanner(text) {
  _pendingClipboardText = text;
  const preview = text.slice(0, 40).replace(/\n/g, ' ');
  $('clipboard-preview').textContent = preview + (text.length > 40 ? '…' : '');
  $('clipboard-banner').classList.add('show');
}

function hideBanner() {
  $('clipboard-banner').classList.remove('show');
  _pendingClipboardText = '';
}

// アプリにフォーカスが戻ったときにクリップボードを自動検出
async function checkClipboardOnFocus() {
  if (tts.total > 0) return; // 既にテキストがロードされていれば無視
  const text = await readClipboard().catch(() => null);
  if (text && text.length > 80) showBanner(text);
}

$('btn-clipboard-main').addEventListener('click', handleClipboardLoad);
$('btn-clipboard-load').addEventListener('click', handleClipboardLoad);
$('btn-clipboard-dismiss').addEventListener('click', hideBanner);

// フォーカス復帰時（Obsidianから切り替えてきたとき）
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible') checkClipboardOnFocus();
});

document.querySelectorAll('.tab').forEach(tab =>
  tab.addEventListener('click', () => {
    switchTab(tab.dataset.tab);
    if (tab.dataset.tab === 'settings') updateCharDisplay();
  })
);

// ============================================================
// CLOUD TTS 文字数カウンター
// ============================================================
function getMonthKey() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
}

function addCloudChars(n) {
  const key = getMonthKey();
  const stored = JSON.parse(localStorage.getItem('obs-tts-char-usage') || '{}');
  stored[key] = (stored[key] || 0) + n;
  localStorage.setItem('obs-tts-char-usage', JSON.stringify(stored));
  updateCharDisplay();
}

function updateCharDisplay() {
  const el = $('char-usage-display');
  if (!el) return;
  const key = getMonthKey();
  const stored = JSON.parse(localStorage.getItem('obs-tts-char-usage') || '{}');
  const used = stored[key] || 0;
  const limit = 1000000;
  const pct = (used / limit * 100).toFixed(1);
  const bar = '█'.repeat(Math.round(used / limit * 20)).padEnd(20, '░');
  el.innerHTML = `<div style="margin-bottom:4px;">今月の使用文字数（${key}）</div>
<div style="font-family:monospace; color:#7c3aed;">${bar}</div>
<div style="margin-top:4px; color:${used > 800000 ? '#f87171' : '#e2e8f0'};">${used.toLocaleString()} / 1,000,000 文字（${pct}%）</div>`;
}

// ============================================================
// CLOUD TTS SETTINGS
// ============================================================
function loadCloudSettings() {
  const key = localStorage.getItem('obs-tts-cloud-key') || '';
  const voice = localStorage.getItem('obs-tts-cloud-voice') || 'Kore';
  $('cloud-api-key').value = key;
  $('cloud-voice-select').value = voice;
  tts.setCloudKey(key, voice);
  if (key) $('cloud-status').textContent = '☁ クラウド音声が有効です';
}

$('btn-test-key').addEventListener('click', async () => {
  const key = $('cloud-api-key').value.trim();
  if (!key) { showToast('APIキーを入力してください'); return; }
  const voice = $('cloud-voice-select').value;
  const status = $('cloud-status');
  status.style.color = '';
  status.textContent = '🔄 テスト中...';
  try {
    const res = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/gemini-3.1-flash-tts-preview:generateContent?key=${key}`,
      { method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          contents: [{ parts: [{ text: 'テスト' }] }],
          generationConfig: {
            responseModalities: ['AUDIO'],
            speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: voice } } }
          }
        }) }
    );
    const data = await res.json();
    if (data.error) throw new Error(`${data.error.code}: ${data.error.message}`);
    const part = data.candidates?.[0]?.content?.parts?.[0];
    if (!part?.inlineData?.data) throw new Error('音声データが取得できませんでした');
    const mimeType = part.inlineData.mimeType || 'audio/pcm;rate=24000';
    const isPcm = mimeType.includes('pcm');
    const sampleRate = parseInt(mimeType.match(/rate=(\d+)/)?.[1] || '24000');
    const audioSrc = isPcm ? pcmToWav(part.inlineData.data, sampleRate) : `data:${mimeType};base64,${part.inlineData.data}`;
    status.style.color = '#4ade80';
    status.textContent = '✅ APIキー OK！Gemini TTS が使えます';
    const audio = new Audio(audioSrc);
    audio.play().catch(() => {});
  } catch (e) {
    status.style.color = '#f87171';
    status.textContent = '❌ エラー: ' + (e.message || String(e));
  }
});

$('btn-reload-app').addEventListener('click', () => location.reload());

$('btn-save-settings').addEventListener('click', () => {
  const key = $('cloud-api-key').value.trim();
  const voice = $('cloud-voice-select').value;
  tts.setCloudKey(key, voice);
  if (key) {
    localStorage.setItem('obs-tts-cloud-key', key);
    localStorage.setItem('obs-tts-cloud-voice', voice);
    $('cloud-status').textContent = '☁ クラウド音声が有効です';
    showToast('設定を保存しました ✓');
  } else {
    localStorage.removeItem('obs-tts-cloud-key');
    localStorage.removeItem('obs-tts-cloud-voice');
    $('cloud-status').textContent = '';
    showToast('APIキーを削除しました');
  }
  switchTab('preview');
});

$('segments-container').addEventListener('click', e => {
  const seg = e.target.closest('.segment');
  if (seg) tts.seekTo(parseInt(seg.dataset.index, 10));
});

// Android: speechSynthesis sometimes pauses in background — nudge it
setInterval(() => {
  if (tts.isPlaying && window.speechSynthesis.paused) {
    window.speechSynthesis.resume();
  }
}, 10000);

// ============================================================
// SERVICE WORKER + SHARE TARGET
// ============================================================
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js')
    .then(() => console.log('SW registered'))
    .catch(e => console.error('SW error:', e));

  navigator.serviceWorker.addEventListener('message', e => {
    if (e.data?.type === 'SHARE_TARGET') {
      loadText(e.data.text || e.data.url || '', e.data.title);
    }
  });
}

window.addEventListener('load', async () => {
  loadCloudSettings();
  const data = await readAndClearShare();
  if (data && (data.text || data.url)) {
    loadText(data.text || data.url, data.title);
  }
});
